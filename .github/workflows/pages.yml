name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (demo at root, src alongside)
        run: |
          mkdir -p _site
          # everything in demo/ (html, css, js, images) becomes the site root
          cp -R demo/. _site/
          # the library source the demo imports via ../src/
          cp -R src _site/src
          # rewrite the demo's parent-relative paths now that src/ sits beside it
          sed -i 's|\.\./src/|./src/|g' _site/index.html _site/index.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
